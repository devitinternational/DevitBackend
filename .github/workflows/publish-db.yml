name: Publish @devitinternational/db

on:
  push:
    branches: [main]
    paths:
      - "prisma/schema.prisma"
      - "packages/db/src/**"
      - "packages/db/package.json"
      - "packages/db/tsconfig.json"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@devitinternational"

      - name: Publish db package
        run: node scripts/publish-db.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
